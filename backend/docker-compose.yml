services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "5000:5000"
      - "80:80"
    networks:
      - deploy-engine-network
    env_file:
      - .env

networks:
  deploy-engine-network:
    name: deploy-engine-network